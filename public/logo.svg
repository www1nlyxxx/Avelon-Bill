<svg width="40" height="48" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Эйфелева башня - детализированная буква A -->
  
  <!-- Основные опоры - левая и правая -->
  <path d="M20 0L18 6L6 46H10L18 12L20 0Z" fill="currentColor"/>
  <path d="M20 0L22 6L34 46H30L22 12L20 0Z" fill="currentColor"/>
  
  <!-- Внутренние контуры опор -->
  <path d="M20 8L17 16L11 40H13L17 20L20 8Z" fill="currentColor" fill-opacity="0.15"/>
  <path d="M20 8L23 16L29 40H27L23 20L20 8Z" fill="currentColor" fill-opacity="0.15"/>
  
  <!-- Арка внизу -->
  <path d="M12 42C12 38 15 35 20 35C25 35 28 38 28 42" stroke="currentColor" stroke-width="1.5" fill="none"/>
  
  <!-- Верхняя платформа -->
  <rect x="14" y="14" width="12" height="2" rx="0.5" fill="currentColor"/>
  
  <!-- Средняя платформа (смотровая) -->
  <rect x="11" y="24" width="18" height="3" rx="0.5" fill="currentColor"/>
  <rect x="13" y="25" width="14" height="1" rx="0.25" fill="currentColor" fill-opacity="0.3"/>
  
  <!-- Нижняя платформа -->
  <rect x="8" y="36" width="24" height="2" rx="0.5" fill="currentColor"/>
  
  <!-- Решётчатая структура - диагонали между платформами -->
  <!-- Верхняя секция -->
  <line x1="15" y1="16" x2="17" y2="24" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="25" y1="16" x2="23" y2="24" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="17" y1="16" x2="15" y2="24" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="23" y1="16" x2="25" y2="24" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  
  <!-- Средняя секция -->
  <line x1="12" y1="27" x2="15" y2="36" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="28" y1="27" x2="25" y2="36" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="16" y1="27" x2="12" y2="36" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="24" y1="27" x2="28" y2="36" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  
  <!-- Антенна на вершине -->
  <line x1="20" y1="0" x2="20" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
